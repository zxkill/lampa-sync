<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Lampa Sync Player</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
    <link rel="stylesheet" href="player/css/player.css">
</head>
<body>
<div id="app">
    <video id="video" playsinline webkit-playsinline preload="auto"></video>
    <div id="shade"></div>
    <div id="subtitleOverlay"></div>

    <div id="top">
        <button id="close" class="btn" type="button" aria-label="Закрыть">✕</button>
        <div id="tw">
            <div id="title">Загрузка...</div>
            <div id="meta">
                <span id="mode" class="pill warn">Подготовка</span>
                <span id="quality" class="pill">fast</span>
                <select id="audioTrack" class="audio-select hide" title="Звуковая дорожка" aria-label="Звуковая дорожка">
                    <option value="0">Аудио: авто</option>
                </select>
                <select id="subtitleTrack" class="audio-select hide" title="Субтитры" aria-label="Субтитры">
                    <option value="-1">Субтитры: выкл.</option>
                </select>
                <span id="prepared" class="pill">0 сегм.</span>
            </div>
        </div>
        <button id="prepareBtn" class="btn prepare-btn" type="button" aria-label="Подготовить видео">⇩ Скачать</button>
        <button id="queueBtn" class="btn" type="button" aria-label="Очередь подготовки">☰</button>
    </div>

    <button id="center" type="button" aria-label="Пуск/пауза">▶</button>

    <div id="status">
        <span class="spin"></span><span id="statusText">Подготовка видео...</span>
    </div>

    <div id="toast"></div>
    <div id="err"></div>

    <div id="controls">
        <div id="progWrap" role="slider" aria-label="Позиция">
            <div id="prog">
                <div id="buf"></div>
                <div id="bar"></div>
                <div id="knob"></div>
            </div>
        </div>

        <div id="row">
            <button id="play" class="btn" type="button" aria-label="Пуск/пауза">▶</button>
            <button id="back" class="btn" type="button" aria-label="Назад на 10 секунд">↶10</button>
            <button id="fwd" class="btn" type="button" aria-label="Вперёд на 10 секунд">10↷</button>
            <div id="time">0:00 / --:--</div>
            <div id="spacer"></div>
            <input id="vol" type="range" min="0" max="1" step="0.01" value="1" aria-label="Громкость">
            <button id="fit" class="btn" type="button" aria-label="Режим отображения">▣</button>
            <button id="full" class="btn" type="button" aria-label="На весь экран">⛶</button>
        </div>
    </div>

    <div id="iphoneHud" aria-hidden="true">
        <div id="iphoneReadout">0:00 / --:--</div>
        <div id="iphoneProgress">
            <div id="iphoneBuf"></div>
            <div id="iphoneBar"></div>
        </div>
    </div>

    <div id="iphonePanel" aria-label="iPhone controls">
        <button id="ipPlay" class="iphoneBtn" type="button">▶</button>
        <button id="ipBack" class="iphoneBtn" type="button">↶10</button>
        <button id="ipFwd" class="iphoneBtn" type="button">10↷</button>
        <button id="ipFit" class="iphoneBtn" type="button">▣</button>
        <button id="ipFull" class="iphoneBtn" type="button">⛶</button>
    </div>
</div>

<!-- Основная логика плеера вынесена в отдельные JS-файлы.
     Важно сохранять порядок подключения: ранние helpers -> state -> модули -> bootstrap. -->
<script src="player/js/00-startup-helpers.js"></script>
<script src="player/js/01-state.js"></script>
<script src="player/js/02-init.js"></script>
<script src="player/js/03-pointer-and-layout.js"></script>
<script src="player/js/04-remote-and-keyboard.js"></script>
<script src="player/js/05-audio-and-subtitles.js"></script>
<script src="player/js/06-prepare-queue-ui.js"></script>
<script src="player/js/07-playback-hls.js"></script>
<script src="player/js/08-playback-recovery.js"></script>
<script src="player/js/09-status-seek-progress.js"></script>
<script src="player/js/10-player-controls.js"></script>
<script src="player/js/11-progress-utils.js"></script>
<script src="player/js/12-bootstrap.js"></script>
</body>
</html>
