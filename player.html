<!-- Основная логика плеера: HLS, подготовка, прогресс и управление. -->
<script>
    const API = new URL('api.php', window.location.href).toString();

    const qs = new URLSearchParams(location.search);
    const src = qs.get('url');
    const titleText = qs.get('title') || 'Видео';

    /*
     * Важное разделение идентификаторов:
     * - mediaCid: конкретный вариант запуска (prepared-HLS, аудиодорожка и т.п.);
     * - progressCid: стабильный ключ прогресса именно этого фильма/серии.
     *
     * Если сохранять прогресс под generic id из Lampa или под id prepared-задачи,
     * разные фильмы могут читать одну и ту же старую позицию, а новые записи будут
     * отбрасываться как “откат назад”. Поэтому read/write всегда идут по baseCid.
     */
    const mediaCid = qs.get('content_id') || hash(src || titleText);
    const progressCid = qs.get('progress_content_id') || mediaCid;
    const cid = mediaCid;
    const baseCid = String(progressCid || mediaCid).replace(/_a\d+$/, '');
    const progressAltIds = (qs.get('progress_alt_ids') || '')
        .split(',')
        .map(v => String(v || '').trim())
        .filter(Boolean);
    const progressIds = uniqueProgressIds([
        baseCid,
        progressCid,
        String(progressCid || '').replace(/_a\d+$/, ''),
        mediaCid,
        String(mediaCid || '').replace(/_a\d+$/, '')
    ].concat(progressAltIds));
    const trans = qs.get('transcode') === '1' || qs.get('hls') === '1';
    const q = qs.get('quality') || 'fast';
    let activeQuality = q;

    // Субтитры временно отключены: UI и загрузка WebVTT не запускаются.
    // Логика оставлена в файле, чтобы позже можно было вернуться без отката больших блоков.
    const SUBTITLES_ENABLED = false;
    const audioPrefKey = 'lampa_sync_audio_track_' + hash(src || baseCid);
    const explicitAudioTrack = qs.has('audio_track') || localStorage.getItem(audioPrefKey) !== null;
    let activeAudioTrack = Math.max(0, parseInt(qs.get('audio_track') || localStorage.getItem(audioPrefKey) || '0', 10) || 0);
    let audioTracks = [];
    let audioTracksLoaded = false;

    const subtitlePrefKey = 'lampa_sync_subtitle_track_' + hash(src || baseCid);
    const explicitSubtitleTrack = qs.has('subtitle_track') || localStorage.getItem(subtitlePrefKey) !== null;
    let activeSubtitleTrack = parseInt(qs.get('subtitle_track') || localStorage.getItem(subtitlePrefKey) || '-1', 10);
    if (!isFinite(activeSubtitleTrack)) activeSubtitleTrack = -1;
    let subtitleTracks = [];
    let currentSubtitleEl = null;
    let subtitleCues = [];
    let subtitleOverlayText = '';
    let subtitleClockMode = 'local'; // local = video.currentTime, global = offset + currentTime

    const app = document.getElementById('app');
    const v = document.getElementById('video');
    const title = document.getElementById('title');
    const mode = document.getElementById('mode');
    const quality = document.getElementById('quality');
    const audioSelect = document.getElementById('audioTrack');
    const subtitleSelect = document.getElementById('subtitleTrack');
    const subtitleOverlay = document.getElementById('subtitleOverlay');
    let subtitleLoadToken = 0;
    const prepared = document.getElementById('prepared');
    const prepareBtn = document.getElementById('prepareBtn');
    const queueBtn = document.getElementById('queueBtn');
    const statusBox = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const center = document.getElementById('center');
    const play = document.getElementById('play');
    const back = document.getElementById('back');
    const fwd = document.getElementById('fwd');
    const closeBtn = document.getElementById('close');
    const full = document.getElementById('full');
    const fit = document.getElementById('fit');
    const progWrap = document.getElementById('progWrap');
    const prog = document.getElementById('prog');
    const bar = document.getElementById('bar');
    const buf = document.getElementById('buf');
    const knob = document.getElementById('knob');
    const row = document.getElementById('row');
    const time = document.getElementById('time');
    const vol = document.getElementById('vol');
    const err = document.getElementById('err');
    const toast = document.getElementById('toast');
    const iphonePanel = document.getElementById('iphonePanel');
    const iphoneHud = document.getElementById('iphoneHud');
    const iphoneReadout = document.getElementById('iphoneReadout');
    const iphoneBar = document.getElementById('iphoneBar');
    const iphoneBuf = document.getElementById('iphoneBuf');
    const ipPlay = document.getElementById('ipPlay');
    const ipBack = document.getElementById('ipBack');
    const ipFwd = document.getElementById('ipFwd');
    const ipFit = document.getElementById('ipFit');
    const ipFull = document.getElementById('ipFull');

    let hls = null;
    let sid = makeSid();
    let offset = 0;
    let duration = 0;
    let preparedUntil = 0;
    let preparedSec = 0;
    let saved = null;
    let lastSync = 0;
    let lastSaved = -1;
    let timer = null;
    let hideTimer = null;
    let stopped = false;
    let fitMode = 'contain';
    let lastRoutedAt = 0;
    let lastRoutedAction = '';
    let remoteFocusIndex = 0;
    let remoteModeTimer = null;
    let hlsMediaRecoveries = 0;
    let hlsSafeFallbackUsed = false;
    const prepareStateKey = 'lampa_sync_prepare_ui_' + baseCid;
    let prepareState = null;
    let prepareUiTimer = null;
    let preparedPlaybackLoaded = false;
    let preparedMediaDuration = 0;
    let preparedResumePending = 0;

    quality.innerText = activeQuality;
    title.innerText = titleText;
    updateDeviceClasses();

    if (!src) {
        showError('Не передан url');
    } else {
        init();
    }
    async function init() {
        bindViewport();
        await loadPrepareState();
        renderPrepareButton();
        startPrepareUiTicker();

        saved = normProg(await loadProgress());

        if (saved && saved.duration > 0) {
            duration = saved.duration;
        }

        let resume = saved && !saved.ended && saved.position > 5
            ? Math.max(0, saved.position - 3)
            : 0;

        /*
         * Старые версии prepared-HLS могли сохранить некорректную позицию,
         * потому что offset уже входил в currentTime и затем прибавлялся второй раз.
         * Если позиция явно выходит за длительность — не пытаемся продолжать с неё.
         */
        if (duration > 0 && resume > duration - 2) {
            resume = 0;
        }

        bindEvents();
        await loadAudioTracks();
        await refreshPrepareState(false);

        if (trans || needsProxy(src)) {
            await startHls(resume, true);
        } else {
            await direct(src, resume);
        }

        resetHide();
    }

    // Подписывает кнопки, клавиатуру, сообщения от родительского окна и lifecycle-события.
    function bindEvents() {
        /*
         * Video itself is intentionally not clickable.
         * Background tap shows/hides controls; play/pause only via buttons.
         */
        app.addEventListener('click', e => {
            if (isUiTarget(e.target)) return;
            resetHide();
        }, true);

        app.addEventListener('touchend', e => {
            if (isUiTarget(e.target)) return;
            resetHide();
        }, {capture: true, passive: true});

        v.ontimeupdate = () => {
            if (Date.now() - lastSync > 5000) {
                lastSync = Date.now();
                save(false);
            }
            ui();
        };

        v.onplay = v.onpause = state;

        v.onended = () => {
            save(true);
            state();
        };

        v.onerror = () => showError('Видео не удалось воспроизвести. Код: ' + (v.error ? v.error.code : '?'));

        bindButton(play, 'play', toggle);
        bindButton(center, 'center', toggle);
        bindButton(back, 'back', () => seek(globalTime() - 10));
        bindButton(fwd, 'fwd', () => seek(globalTime() + 30));
        bindButton(closeBtn, 'close', requestClose);
        bindButton(full, 'full', toggleFullscreen);
        bindButton(fit, 'fit', toggleFit);
        bindButton(prepareBtn, 'prepare', togglePrepare);
        bindButton(queueBtn, 'queue', openPrepareQueue);

        bindVolume();
        bindAudioTrackSelect();
        bindSubtitleTrackSelect();
        bindSubtitleOverlayEvents();
        bindProgress();

        bindLandscapeRouter();
        bindIPhoneControls();

        document.addEventListener('mousemove', resetHide, {passive: true});
        document.addEventListener('touchstart', e => {
            if (!isUiTarget(e.target)) resetHide();
        }, {passive: true});

        document.addEventListener('keydown', e => {
            handleRemoteInput(e);
        }, true);

        window.addEventListener('message', e => {
            const data = e.data || {};

            if (data.type === 'lampa-sync-close') {
                requestClose();
                return;
            }

            if (data.type === 'lampa-sync-remote-key') {
                handleRemoteInput(data);
            }
        });

        window.addEventListener('beforeunload', shutdown);
        window.addEventListener('pagehide', shutdown);
    }

    // Универсально привязывает кнопку к действию мыши/тача.
    function bindButton(el, name, handler) {
        if (!el) return;

        let last = 0;

        const run = e => {
            stopEvent(e);

            const now = Date.now();
            if (now - last < 260) return;
            last = now;

            routeAction(name, handler);
        };

        el.addEventListener('click', run, {passive: false});
        el.addEventListener('touchend', run, {passive: false});
        el.addEventListener('pointerup', run, {passive: false});

        ['touchstart', 'pointerdown', 'mousedown', 'mouseup'].forEach(type => {
            el.addEventListener(type, e => e.stopPropagation(), {passive: true});
        });
    }

    // Настраивает громкость и mute.
    function bindVolume() {
        if (!vol) return;

        const update = e => {
            e.stopPropagation();
            v.volume = +vol.value;
            v.muted = v.volume <= 0;
        };

        vol.addEventListener('input', update, {passive: true});
        vol.addEventListener('change', update, {passive: true});
        ['touchstart', 'touchend', 'pointerdown', 'pointerup', 'click'].forEach(type => {
            vol.addEventListener(type, e => e.stopPropagation(), {passive: true});
        });
    }

    // Настраивает перемотку по нижнему прогресс-бару.
    function bindProgress() {
        const run = e => {
            if (isIPhoneLandscape()) {
                stopEvent(e);
                resetHide();
                return;
            }

            stopEvent(e);
            seekByPoint(getPoint(e));
        };

        progWrap.addEventListener('click', run, {passive: false});
        progWrap.addEventListener('touchend', run, {passive: false});
        progWrap.addEventListener('pointerup', run, {passive: false});
        ['touchstart', 'pointerdown', 'mousedown'].forEach(type => {
            progWrap.addEventListener(type, e => e.stopPropagation(), {passive: true});
        });
    }

    // Разводит тачи в landscape-режиме iPhone, где элементы часто перекрываются.
    function bindLandscapeRouter() {
        const handler = e => {
            if (!isIPhoneLandscape()) return;

            const point = getPoint(e);
            if (!point) return;

            const h = viewportHeight();
            const bottomZoneTop = h - 150;

            /*
             * Dedicated iPhone landscape layer:
             * bottom 150px belongs only to iPhone panel.
             * No progress/seek can happen here.
             */
            if (point.clientY >= bottomZoneTop) {
                stopEvent(e);
                routeIPhoneByX(point);
                return;
            }

            const closeRect = rect(closeBtn);

            if (inside(point, expand(closeRect, 18))) {
                stopEvent(e);
                routeAction('close', requestClose);
                return;
            }

            resetHide();
        };

        document.addEventListener('touchstart', handler, {capture: true, passive: false});
        document.addEventListener('touchend', handler, {capture: true, passive: false});
        document.addEventListener('pointerdown', handler, {capture: true, passive: false});
        document.addEventListener('pointerup', handler, {capture: true, passive: false});
        document.addEventListener('click', handler, {capture: true, passive: false});
    }


    // Подключает отдельную нижнюю панель управления для iPhone landscape.

    function bindIPhoneControls() {
        bindButton(ipPlay, 'ipPlay', toggle);
        bindButton(ipBack, 'ipBack', () => seek(globalTime() - 10));
        bindButton(ipFwd, 'ipFwd', () => seek(globalTime() + 30));
        bindButton(ipFit, 'ipFit', toggleFit);
        bindButton(ipFull, 'ipFull', toggleFullscreen);

        if (iphonePanel) {
            ['touchstart', 'touchend', 'pointerdown', 'pointerup', 'click'].forEach(type => {
                iphonePanel.addEventListener(type, e => {
                    if (!isIPhoneLandscape()) return;
                    stopEvent(e);
                    routeIPhoneByX(getPoint(e));
                }, {passive: false});
            });
        }
    }

    // Определяет действие iPhone-панели по координате X.
    function routeIPhoneByX(point) {
        if (!point) {
            resetHide();
            return;
        }

        const w = viewportWidth();
        const x = Math.min(w - 1, Math.max(0, point.clientX));
        const segment = Math.max(0, Math.min(4, Math.floor((x / Math.max(1, w)) * 5)));

        if (segment === 0) {
            routeAction('ipPlay', toggle);
        } else if (segment === 1) {
            routeAction('ipBack', () => seek(globalTime() - 10));
        } else if (segment === 2) {
            routeAction('ipFwd', () => seek(globalTime() + 30));
        } else if (segment === 3) {
            routeAction('ipFit', toggleFit);
        } else {
            routeAction('ipFull', toggleFullscreen);
        }
    }

    // Возвращает актуальную ширину viewport с учётом iOS-особенностей.
    function viewportWidth() {
        return (window.visualViewport ? window.visualViewport.width : window.innerWidth) ||
            document.documentElement.clientWidth ||
            0;
    }

    // Определяет, на какую кнопку попал touch/click.
    function findButtonAction(point) {
        const actions = [
            {el: play, name: 'play', handler: toggle},
            {el: back, name: 'back', handler: () => seek(globalTime() - 10)},
            {el: fwd, name: 'fwd', handler: () => seek(globalTime() + 30)},
            {el: fit, name: 'fit', handler: toggleFit},
            {el: full, name: 'full', handler: toggleFullscreen},
            {el: vol, name: 'vol', handler: () => volumeByPoint(point)},
            {el: closeBtn, name: 'close', handler: requestClose}
        ];

        for (const item of actions) {
            if (!item.el) continue;

            if (inside(point, expand(rect(item.el), 12))) {
                return item;
            }
        }

        return null;
    }

    // Определяет кнопку нижней iPhone-панели.
    function findIPhoneBottomAction(point) {
        const actions = [
            {el: play, name: 'play', handler: toggle},
            {el: back, name: 'back', handler: () => seek(globalTime() - 10)},
            {el: fwd, name: 'fwd', handler: () => seek(globalTime() + 30)},
            {el: fit, name: 'fit', handler: toggleFit},
            {el: full, name: 'full', handler: toggleFullscreen}
        ].filter(item => item.el);

        /*
         * First: real button rectangles.
         */
        for (const item of actions) {
            if (inside(point, expand(rect(item.el), 20, 22))) {
                return item;
            }
        }

        /*
         * Fallback for iPhone after rotation:
         * If y is already in the bottom control zone, pick nearest button by X.
         * This avoids accidental seek because progress is disabled here.
         */
        let best = null;
        let bestDistance = Infinity;

        for (const item of actions) {
            const r = rect(item.el);
            const cx = r.left + r.width / 2;
            const distance = Math.abs(point.clientX - cx);

            if (distance < bestDistance) {
                bestDistance = distance;
                best = item;
            }
        }

        return bestDistance <= 76 ? best : null;
    }

    // Выполняет действие и гасит исходное событие.
    function routeAction(name, handler) {
        const now = Date.now();

        if (name === lastRoutedAction && now - lastRoutedAt < 240) {
            return;
        }

        lastRoutedAction = name;
        lastRoutedAt = now;

        resetHide();
        handler();
    }

    // Перематывает видео по позиции клика на прогресс-баре.
    function seekByPoint(point) {
        const d = total();
        if (!d || !point) return;

        const r = rect(prog);
        const p = Math.min(1, Math.max(0, (point.clientX - r.left) / r.width));

        seek(d * p);
    }

    // Меняет громкость по координате на слайдере.
    function volumeByPoint(point) {
        const r = rect(vol);
        const p = Math.min(1, Math.max(0, (point.clientX - r.left) / r.width));

        vol.value = String(p);
        v.volume = p;
        v.muted = p <= 0;
    }

    // Проверяет телефонный landscape-режим.
    function isLandscapePhone() {
        return isIPhoneLandscape();
    }

    // Определяет iPhone/iPod по userAgent/platform.
    function isIPhoneLike() {
        const ua = navigator.userAgent || '';
        const platform = navigator.platform || '';
        const maxTouch = navigator.maxTouchPoints || 0;
        const minScreen = Math.min(screen.width || 0, screen.height || 0);

        return /iPhone|iPod/i.test(ua) ||
            /iPhone|iPod/i.test(platform) ||
            (maxTouch > 0 && minScreen > 0 && minScreen <= 430 && !/iPad/i.test(ua));
    }

    // Проверяет специальный режим iPhone landscape.
    function isIPhoneLandscape() {
        const w = window.visualViewport ? window.visualViewport.width : window.innerWidth;
        const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;

        return isIPhoneLike() && w > h && h <= 540;
    }
    function viewportHeight() {
        return (window.visualViewport ? window.visualViewport.height : window.innerHeight) ||
            document.documentElement.clientHeight ||
            0;
    }

    // Обновляет CSS-классы устройства на body.
    function updateDeviceClasses() {
        const iphone = isIPhoneLike();
        const iphoneLandscape = isIPhoneLandscape();

        document.body.classList.toggle('iphone', iphone);
        document.body.classList.toggle('iphone-landscape', iphoneLandscape);
    }

    // Отслеживает resize/orientationchange и обновляет CSS-переменные viewport.
    function bindViewport() {
        const apply = () => {
            const w = Math.round((window.visualViewport ? window.visualViewport.width : window.innerWidth) || document.documentElement.clientWidth || 0);
            const h = Math.round((window.visualViewport ? window.visualViewport.height : window.innerHeight) || document.documentElement.clientHeight || 0);

            if (w > 0) document.documentElement.style.setProperty('--vw', w + 'px');
            if (h > 0) document.documentElement.style.setProperty('--vh', h + 'px');

            updateDeviceClasses();
            updateRemoteFocus();

            document.body.classList.remove('clean');
            setTimeout(resetHide, 250);
        };

        apply();

        window.addEventListener('resize', apply, {passive: true});
        window.addEventListener('orientationchange', () => {
            setTimeout(apply, 60);
            setTimeout(apply, 300);
            setTimeout(apply, 900);
        }, {passive: true});

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', apply, {passive: true});
            window.visualViewport.addEventListener('scroll', apply, {passive: true});
        }
    }
    function rect(el) {
        return el.getBoundingClientRect();
    }
    function expand(r, x, y) {
        y = typeof y === 'number' ? y : x;

        return {
            left: r.left - x,
            right: r.right + x,
            top: r.top - y,
            bottom: r.bottom + y,
            width: r.width + x * 2,
            height: r.height + y * 2
        };
    }
    function inside(point, r) {
        return point.clientX >= r.left &&
            point.clientX <= r.right &&
            point.clientY >= r.top &&
            point.clientY <= r.bottom;
    }
    function getPoint(e) {
        if (e && e.changedTouches && e.changedTouches[0]) return e.changedTouches[0];
        if (e && e.touches && e.touches[0]) return e.touches[0];
        return e;
    }
    function stopEvent(e) {
        if (!e) return;

        if (e.cancelable && typeof e.preventDefault === 'function') {
            e.preventDefault();
        }

        if (typeof e.stopPropagation === 'function') {
            e.stopPropagation();
        }

        if (typeof e.stopImmediatePropagation === 'function') {
            e.stopImmediatePropagation();
        }
    }
    function isUiTarget(target) {
        return !!(target && target.closest && target.closest('#top, #controls, #row, #progWrap, #iphonePanel, #iphoneHud, #status, #err, #toast, button, input, .btn, .iphoneBtn'));
    }


    // Принимает события пульта/клавиатуры из родительского окна Lampa.

    function handleRemoteInput(e) {
        const key = String(e.key || '');
        const code = String(e.code || '');
        const keyCode = Number(e.keyCode || e.which || 0);

        const handled = handleRemoteKey(key, code, keyCode);

        if (handled) {
            stopEvent(e);
        }

        return handled;
    }

    // Преобразует клавиши пульта в действия плеера.
    function handleRemoteKey(key, code, keyCode) {
        const k = key.toLowerCase();

        enableRemoteMode();

        if (isBackKey(k, code, keyCode)) {
            requestClose();
            return true;
        }

        if (isPlayPauseKey(k, code, keyCode)) {
            routeAction('remoteToggle', toggle);
            return true;
        }

        if (isPauseKey(k, code, keyCode)) {
            if (!v.paused) routeAction('remotePause', () => v.pause());
            return true;
        }

        if (isPlayKey(k, code, keyCode)) {
            if (v.paused) routeAction('remotePlay', tryPlay);
            return true;
        }

        if (isStopKey(k, code, keyCode)) {
            requestClose();
            return true;
        }

        if (isLeftKey(k, code, keyCode) || isRewindKey(k, code, keyCode)) {
            routeAction('remoteBack', () => seek(globalTime() - 10));
            setRemoteFocusByName('back');
            return true;
        }

        if (isRightKey(k, code, keyCode) || isForwardKey(k, code, keyCode)) {
            routeAction('remoteFwd', () => seek(globalTime() + 30));
            setRemoteFocusByName('fwd');
            return true;
        }

        if (isUpKey(k, code, keyCode)) {
            moveRemoteFocus(-1);
            return true;
        }

        if (isDownKey(k, code, keyCode)) {
            moveRemoteFocus(1);
            return true;
        }

        if (isOkKey(k, code, keyCode)) {
            const target = getRemoteTargets()[remoteFocusIndex] || getRemoteTargets()[0];

            if (target) {
                routeAction('remoteOk_' + target.name, target.handler);
            } else {
                routeAction('remoteToggle', toggle);
            }

            return true;
        }

        if (k === 'f' || keyCode === 122) {
            routeAction('remoteFull', toggleFullscreen);
            setRemoteFocusByName('full');
            return true;
        }

        return false;
    }

    // Включает режим навигации пультом по элементам управления.
    function enableRemoteMode() {
        document.body.classList.add('remote-mode');
        resetHide();
        updateRemoteFocus();

        clearTimeout(remoteModeTimer);
        remoteModeTimer = setTimeout(() => {
            if (!v.paused) {
                document.body.classList.remove('remote-mode');
            }
        }, 7000);
    }

    // Возвращает список фокусируемых элементов для пульта.
    function getRemoteTargets() {
        if (isIPhoneLandscape()) {
            return [
                {el: ipPlay, name: 'play', handler: toggle},
                {el: ipBack, name: 'back', handler: () => seek(globalTime() - 10)},
                {el: ipFwd, name: 'fwd', handler: () => seek(globalTime() + 30)},
                {el: ipFit, name: 'fit', handler: toggleFit},
                {el: ipFull, name: 'full', handler: toggleFullscreen}
            ].filter(item => item.el);
        }

        return [
            {el: play, name: 'play', handler: toggle},
            {el: back, name: 'back', handler: () => seek(globalTime() - 10)},
            {el: fwd, name: 'fwd', handler: () => seek(globalTime() + 30)},
            {el: fit, name: 'fit', handler: toggleFit},
            {el: full, name: 'full', handler: toggleFullscreen},
            {el: prepareBtn, name: 'prepare', handler: togglePrepare},
            {el: closeBtn, name: 'close', handler: requestClose}
        ].filter(item => item.el);
    }

    // Передвигает фокус пульта по панели управления.
    function moveRemoteFocus(delta) {
        const targets = getRemoteTargets();

        if (!targets.length) return;

        remoteFocusIndex = (remoteFocusIndex + delta + targets.length) % targets.length;
        updateRemoteFocus();
    }

    // Ставит фокус пульта на конкретное действие.
    function setRemoteFocusByName(name) {
        const targets = getRemoteTargets();
        const index = targets.findIndex(item => item.name === name);

        if (index >= 0) {
            remoteFocusIndex = index;
            updateRemoteFocus();
        }
    }

    // Синхронизирует CSS-класс фокуса с текущим элементом.
    function updateRemoteFocus() {
        document.querySelectorAll('.remote-focused').forEach(el => {
            el.classList.remove('remote-focused');
        });

        const targets = getRemoteTargets();

        if (!targets.length) return;

        if (remoteFocusIndex < 0 || remoteFocusIndex >= targets.length) {
            remoteFocusIndex = 0;
        }

        const target = targets[remoteFocusIndex];

        if (target && target.el) {
            target.el.classList.add('remote-focused');
        }
    }
    function isOkKey(k, code, keyCode) {
        return k === 'enter' ||
            k === 'ok' ||
            code === 'Enter' ||
            code === 'NumpadEnter' ||
            keyCode === 13 ||
            keyCode === 23 ||
            keyCode === 66;
    }
    function isBackKey(k, code, keyCode) {
        return k === 'escape' ||
            k === 'backspace' ||
            k === 'browserback' ||
            code === 'Escape' ||
            code === 'Backspace' ||
            keyCode === 8 ||
            keyCode === 27 ||
            keyCode === 461 ||
            keyCode === 10009;
    }
    function isLeftKey(k, code, keyCode) {
        return k === 'arrowleft' || code === 'ArrowLeft' || keyCode === 37 || keyCode === 21;
    }
    function isRightKey(k, code, keyCode) {
        return k === 'arrowright' || code === 'ArrowRight' || keyCode === 39 || keyCode === 22;
    }
    function isUpKey(k, code, keyCode) {
        return k === 'arrowup' || code === 'ArrowUp' || keyCode === 38 || keyCode === 19;
    }
    function isDownKey(k, code, keyCode) {
        return k === 'arrowdown' || code === 'ArrowDown' || keyCode === 40 || keyCode === 20;
    }
    function isPlayPauseKey(k, code, keyCode) {
        return k === 'mediaplaypause' ||
            code === 'MediaPlayPause' ||
            keyCode === 179 ||
            keyCode === 10252;
    }
    function isPlayKey(k, code, keyCode) {
        return k === 'mediaplay' ||
            code === 'MediaPlay' ||
            keyCode === 415;
    }
    function isPauseKey(k, code, keyCode) {
        return k === 'mediapause' ||
            code === 'MediaPause' ||
            keyCode === 19;
    }
    function isStopKey(k, code, keyCode) {
        return k === 'mediastop' ||
            code === 'MediaStop' ||
            keyCode === 413;
    }
    function isRewindKey(k, code, keyCode) {
        return k === 'mediarewind' ||
            code === 'MediaRewind' ||
            keyCode === 412;
    }
    function isForwardKey(k, code, keyCode) {
        return k === 'mediafastforward' ||
            code === 'MediaFastForward' ||
            keyCode === 417;
    }

    // Возвращает content_id варианта видео с выбранной аудиодорожкой.
    // Прогресс просмотра остаётся привязан к обычному cid, а HLS/prepared-кэш — к cid+audio.
    function mediaContentId() {
        return activeAudioTrack > 0 ? (baseCid + '_a' + activeAudioTrack) : baseCid;
    }

    // Отдельный sid нужен, чтобы HLS с разными аудиодорожками не смешивался в одной папке.
    function makeSid() {
        return 'sid_' + hash(mediaContentId());
    }

    // Загружает список аудиодорожек через ffprobe endpoint до запуска HLS.
    async function loadAudioTracks() {
        if (!src || audioTracksLoaded) return audioTracks;
        audioTracksLoaded = true;

        try {
            const u = API + '?media_info=1&url=' + encodeURIComponent(src) + '&t=' + Date.now();
            const d = await (await fetch(u, {cache: 'no-store'})).json();
            audioTracks = d && d.ok && Array.isArray(d.audio_tracks) ? d.audio_tracks : [];
            subtitleTracks = d && d.ok && Array.isArray(d.subtitle_tracks) ? d.subtitle_tracks : [];

            if (!explicitAudioTrack && audioTracks.length) {
                const preferred = findPreferredAudioTrack(audioTracks);
                if (preferred >= 0) activeAudioTrack = preferred;
            }

            if (!explicitSubtitleTrack) {
                activeSubtitleTrack = -1;
            }

            renderAudioTrackSelect();
            renderSubtitleTrackSelect();
        } catch (e) {
            audioTracks = [];
            subtitleTracks = [];
            renderAudioTrackSelect();
            renderSubtitleTrackSelect();
        }

        return audioTracks;
    }

    // По умолчанию стараемся выбрать русскую дорожку, если она явно подписана как ru/rus/russian/рус.
    function findPreferredAudioTrack(tracks) {
        for (const track of tracks) {
            const text = [track.language, track.title, track.label].join(' ').toLowerCase();
            if (/\b(rus|ru|russian)\b/.test(text) || text.indexOf('рус') >= 0) {
                return Number(track.audio_index || 0);
            }
        }
        const def = tracks.find(track => !!track.default);
        return def ? Number(def.audio_index || 0) : Number(tracks[0].audio_index || 0);
    }

    // Рисует выпадающий список аудиодорожек в верхней панели.
    function renderAudioTrackSelect() {
        if (!audioSelect) return;

        audioSelect.innerHTML = '';
        if (!audioTracks.length) {
            audioSelect.classList.add('hide');
            return;
        }

        audioTracks.forEach(track => {
            const option = document.createElement('option');
            option.value = String(track.audio_index || 0);
            option.textContent = track.label || ('Аудио ' + (Number(track.audio_index || 0) + 1));
            audioSelect.appendChild(option);
        });

        audioSelect.value = String(activeAudioTrack);
        audioSelect.classList.remove('hide');
    }

    // Рисует выпадающий список субтитров. Первый пункт всегда выключает субтитры.
    function renderSubtitleTrackSelect() {
        if (!subtitleSelect) return;
        if (!SUBTITLES_ENABLED) {
            activeSubtitleTrack = -1;
            subtitleTracks = [];
            try { subtitleSelect.value = '-1'; } catch (e) {}
            subtitleSelect.classList.add('hide');
            clearSubtitleTrack();
            return;
        }

        subtitleSelect.innerHTML = '';

        const off = document.createElement('option');
        off.value = '-1';
        off.textContent = 'Субтитры: выкл.';
        subtitleSelect.appendChild(off);

        const usable = subtitleTracks.filter(track => track && track.supported !== false);
        if (!usable.length) {
            subtitleSelect.classList.add('hide');
            return;
        }

        usable.forEach(track => {
            const option = document.createElement('option');
            option.value = String(track.subtitle_index || 0);
            option.textContent = track.label || ('Субтитры ' + (Number(track.subtitle_index || 0) + 1));
            subtitleSelect.appendChild(option);
        });

        subtitleSelect.value = String(activeSubtitleTrack);
        subtitleSelect.classList.remove('hide');
    }

    // Удаляет текущие субтитры: и нативный <track>, и наш JS-overlay.
    function clearSubtitleTrack() {
        if (currentSubtitleEl && currentSubtitleEl.parentNode) {
            currentSubtitleEl.parentNode.removeChild(currentSubtitleEl);
        }
        currentSubtitleEl = null;
        subtitleCues = [];
        subtitleOverlayText = '';
        subtitleClockMode = 'local';
        updateSubtitleOverlay(true);
    }

    // Загружает выбранную дорожку субтитров как WebVTT.
    // Backend теперь может готовить VTT в фоне: если он возвращает 202/pending,
    // плеер не падает с ошибкой, а аккуратно ждёт готовый файл и опрашивает endpoint.
    async function applySubtitleTrack() {
        clearSubtitleTrack();

        if (!SUBTITLES_ENABLED) return;
        if (activeSubtitleTrack < 0 || !src) return;

        const token = ++subtitleLoadToken;
        const subtitleOffset = preparedPlaybackLoaded ? 0 : Math.max(0, offset || 0);
        const url = API +
            '?subtitle_vtt=1' +
            '&url=' + encodeURIComponent(src) +
            '&subtitle_track=' + encodeURIComponent(String(activeSubtitleTrack)) +
            '&start=' + encodeURIComponent(String(subtitleOffset));

        try {
            note('Субтитры готовятся...');
            const text = await waitSubtitleVtt(url, token);
            if (token !== subtitleLoadToken || activeSubtitleTrack < 0) return;

            subtitleCues = parseWebVtt(text);
            subtitleClockMode = chooseSubtitleClockMode(subtitleCues, subtitleOffset);

            if (!subtitleCues.length) {
                console.warn('[Lampa Sync] subtitle vtt has no cues:', text.slice(0, 500));
                note('Субтитры пустые или не распознаны');
                return;
            }

            // Нативный track оставляем как дополнительный fallback для браузеров, где он работает.
            const tr = document.createElement('track');
            tr.kind = 'subtitles';
            tr.label = subtitleSelect && subtitleSelect.selectedIndex >= 0
                ? subtitleSelect.options[subtitleSelect.selectedIndex].textContent
                : 'Субтитры';
            tr.srclang = subtitleLanguage(activeSubtitleTrack) || 'ru';
            tr.src = url + '&t=' + Date.now();
            tr.default = true;
            v.appendChild(tr);
            currentSubtitleEl = tr;

            tr.addEventListener('load', () => {
                try {
                    for (let i = 0; i < v.textTracks.length; i++) v.textTracks[i].mode = 'disabled';
                    if (tr.track) tr.track.mode = 'showing';
                } catch (e) {}
            });

            setTimeout(() => {
                try {
                    for (let i = 0; i < v.textTracks.length; i++) v.textTracks[i].mode = 'disabled';
                    if (tr.track) tr.track.mode = 'showing';
                } catch (e) {}
                updateSubtitleOverlay(true);
            }, 150);

            note('Субтитры включены');
        } catch (e) {
            if (token !== subtitleLoadToken) return;
            console.warn('[Lampa Sync] subtitle apply failed:', e);
            note(String(e && e.message ? e.message : 'Ошибка загрузки субтитров'));
        }
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function waitSubtitleVtt(baseUrl, token) {
        const maxAttempts = 300; // до 10 минут: субтитры извлекаются полным проходом от начала файла
        let lastError = '';

        for (let i = 0; i < maxAttempts; i++) {
            if (token !== subtitleLoadToken) throw new Error('Загрузка субтитров отменена');

            const response = await fetch(baseUrl + '&t=' + Date.now(), {cache: 'no-store'});
            const contentType = String(response.headers.get('content-type') || '').toLowerCase();
            const text = await response.text();

            if (response.ok && text.indexOf('-->') >= 0) {
                return text;
            }

            let json = null;
            if (contentType.indexOf('application/json') >= 0 || /^\s*\{/.test(text)) {
                try { json = JSON.parse(text); } catch (e) { json = null; }
            }

            if (response.status === 202 || (json && json.pending)) {
                if (i === 0) note('Субтитры извлекаются из файла. Это может занять несколько минут...');
                await sleep(2000);
                continue;
            }

            lastError = json && json.error ? json.error : (text ? text.slice(0, 260) : ('HTTP ' + response.status));
            break;
        }

        throw new Error(lastError ? ('Субтитры не загрузились: ' + lastError) : 'Субтитры не успели подготовиться');
    }

    // Подписки для собственной отрисовки субтитров поверх видео.
    function bindSubtitleOverlayEvents() {
        v.addEventListener('timeupdate', () => updateSubtitleOverlay(false));
        v.addEventListener('seeking', () => updateSubtitleOverlay(true));
        v.addEventListener('seeked', () => updateSubtitleOverlay(true));
        v.addEventListener('play', () => updateSubtitleOverlay(true));
        v.addEventListener('pause', () => updateSubtitleOverlay(true));
    }

    // Показывает активный cue на текущем времени video.currentTime.
    function updateSubtitleOverlay(force) {
        if (!subtitleOverlay) return;

        if (!subtitleCues.length || activeSubtitleTrack < 0) {
            subtitleOverlay.style.display = 'none';
            subtitleOverlay.textContent = '';
            subtitleOverlayText = '';
            return;
        }

        const t = subtitleCurrentTime();
        let text = '';

        for (const cue of subtitleCues) {
            if (t >= cue.start && t <= cue.end) {
                text = cue.text;
                break;
            }
        }

        if (force || text !== subtitleOverlayText) {
            subtitleOverlayText = text;
            subtitleOverlay.textContent = text;
            subtitleOverlay.style.display = text ? 'block' : 'none';
        }
    }

    // Очень простой WebVTT parser: нам нужны только start/end/text.
    function parseWebVtt(raw) {
        raw = String(raw || '').replace(/^\uFEFF/, '').replace(/\r/g, '');
        const blocks = raw.split(/\n\s*\n/g);
        const cues = [];

        for (const block of blocks) {
            const lines = block.split('\n').map(x => x.trimEnd()).filter(Boolean);
            if (!lines.length) continue;
            if (/^WEBVTT/i.test(lines[0]) || /^NOTE\b/i.test(lines[0])) continue;

            let timeLineIndex = lines.findIndex(line => line.indexOf('-->') >= 0);
            if (timeLineIndex < 0) continue;

            const m = lines[timeLineIndex].match(/([^\s]+)\s*-->\s*([^\s]+)/);
            if (!m) continue;

            let start = parseVttTime(m[1]);
            let end = parseVttTime(m[2]);
            if (!isFinite(start) || !isFinite(end) || end <= start) continue;

            const text = lines.slice(timeLineIndex + 1)
                .join('\n')
                .replace(/<[^>]+>/g, '')
                .replace(/\\N/g, '\n')
                .trim();

            if (!text) continue;

            cues.push({start, end, text});
        }

        cues.sort((a, b) => a.start - b.start);
        return cues;
    }

    // Выбирает, по каким часам сверять субтитры.
    // Временный HLS может начинаться с currentTime=0 при offset=40:00, а WebVTT
    // может прийти либо с локальными таймкодами, либо с абсолютными таймкодами фильма.
    function chooseSubtitleClockMode(cues, subtitleOffset) {
        if (!Array.isArray(cues) || !cues.length) return 'local';

        const localT = Math.max(0, Number(v.currentTime || 0));
        const globalT = Math.max(0, Number(globalTime ? globalTime() : localT));

        function distanceToNearest(t) {
            let best = Infinity;
            for (const cue of cues) {
                if (t >= cue.start && t <= cue.end) return 0;
                best = Math.min(best, Math.abs(cue.start - t), Math.abs(cue.end - t));
            }
            return best;
        }

        const dl = distanceToNearest(localT);
        const dg = distanceToNearest(globalT);

        if (subtitleOffset > 0 && dg + 5 < dl) return 'global';
        if (subtitleOffset > 0 && cues[0].start > Math.max(30, subtitleOffset * 0.5)) return 'global';
        return 'local';
    }

    function subtitleCurrentTime() {
        if (subtitleClockMode === 'global') {
            return Math.max(0, Number(globalTime ? globalTime() : 0));
        }
        return Math.max(0, Number(v.currentTime || 0));
    }

    function parseVttTime(value) {
        const parts = String(value || '').replace(',', '.').split(':');
        let h = 0, m = 0, s = 0;

        if (parts.length === 3) {
            h = Number(parts[0]);
            m = Number(parts[1]);
            s = Number(parts[2]);
        } else if (parts.length === 2) {
            m = Number(parts[0]);
            s = Number(parts[1]);
        } else {
            s = Number(parts[0]);
        }

        return h * 3600 + m * 60 + s;
    }

    function subtitleLanguage(subtitleIndex) {
        const track = subtitleTracks.find(t => Number(t.subtitle_index || 0) === Number(subtitleIndex));
        return track && track.language ? String(track.language).slice(0, 8) : '';
    }

    // При смене субтитров видео не пересобирается: меняется только подключённый WebVTT.
    function bindSubtitleTrackSelect() {
        if (!subtitleSelect) return;
        if (!SUBTITLES_ENABLED) {
            subtitleSelect.classList.add('hide');
            return;
        }
        subtitleSelect.addEventListener('change', async e => {
            const next = parseInt(e.target.value || '-1', 10);
            activeSubtitleTrack = isFinite(next) ? next : -1;
            localStorage.setItem(subtitlePrefKey, String(activeSubtitleTrack));
            note(activeSubtitleTrack < 0 ? 'Субтитры выключены' : 'Субтитры: ' + (subtitleSelect.options[subtitleSelect.selectedIndex]?.textContent || ('#' + (activeSubtitleTrack + 1))));
            await applySubtitleTrack();
        });
    }

    // При смене дорожки пересобираем HLS с той же позиции, но уже с другим -map 0:a:N.
    function bindAudioTrackSelect() {
        if (!audioSelect) return;
        audioSelect.addEventListener('change', async e => {
            const next = Math.max(0, parseInt(e.target.value || '0', 10) || 0);
            if (next === activeAudioTrack) return;

            const pos = globalTime();
            activeAudioTrack = next;
            localStorage.setItem(audioPrefKey, String(activeAudioTrack));
            sid = makeSid();
            hlsSafeFallbackUsed = false;
            prepareState = {status: 'idle', progress: 0, updated_at: Date.now()};
            renderPrepareButton();
            note('Аудиодорожка: ' + (audioSelect.options[audioSelect.selectedIndex]?.textContent || ('#' + (activeAudioTrack + 1))));

            await refreshPrepareState(false);
            if (trans || needsProxy(src)) await startHls(pos, true);
        });
    }

    // Открывает страницу очереди подготовки.
    function openPrepareQueue() {
        window.open(new URL('prepare_queue.html?t=' + Date.now(), window.location.href).toString(), '_blank');
    }
    async function loadPrepareState() {
        prepareState = {status: 'idle', progress: 0, updated_at: Date.now()};
        await refreshPrepareState(false);
    }
    async function fetchPrepareStatus() {
        const u = API +
            '?prepare_status=1' +
            '&content_id=' + encodeURIComponent(mediaContentId()) +
            '&url=' + encodeURIComponent(src || '') +
            '&audio_track=' + encodeURIComponent(String(activeAudioTrack)) +
            '&t=' + Date.now();
        const r = await fetch(u, {cache: 'no-store'});
        const d = await r.json();
        if (!d || !d.ok) throw new Error((d && d.error) || 'prepare_status failed');
        return d.item || {status: 'idle', content_id: mediaContentId(), audio_track: activeAudioTrack};
    }
    async function refreshPrepareState(showErrors) {
        try {
            const item = await fetchPrepareStatus();
            prepareState = normalizePrepareItem(item);
            renderPrepareButton();
            return prepareState;
        } catch (e) {
            if (showErrors) note('Не удалось получить статус подготовки');
            renderPrepareButton();
            return prepareState || {status: 'idle', progress: 0};
        }
    }

    // Приводит запись prepare_status/list к единому формату.
    function normalizePrepareItem(item) {
        item = item && typeof item === 'object' ? item : {};
        const status = String(item.status || 'idle');
        return {
            status: status,
            progress: Math.max(0, Math.min(100, Number(item.progress || 0))),
            title: item.title || titleText,
            content_id: item.content_id || mediaContentId(),
            audio_track: Number(item.audio_track || activeAudioTrack),
            audio_tracks: Array.isArray(item.audio_tracks) ? item.audio_tracks : [],
            prepare_key: item.prepare_key || '',
            hls_url: item.hls_url || '',
            duration: Number(item.duration || 0),
            prepared_seconds: Number(item.prepared_seconds || 0),
            segments: Number(item.segments || 0),
            running: !!item.running,
            error: item.error || '',
            updated_at: Number(item.updated_at || Date.now())
        };
    }

    // Отрисовывает кнопку “Скачать/Готовится/Готово” в верхней панели.
    function renderPrepareButton() {
        if (!prepareBtn) return;

        const status = prepareState && prepareState.status ? String(prepareState.status) : 'idle';
        prepareBtn.classList.remove('preparing', 'ready', 'delete');
        prepareBtn.disabled = false;

        if (status === 'queued') {
            prepareBtn.classList.add('preparing');
            prepareBtn.innerText = '⏳ Очередь';
            prepareBtn.title = 'Видео добавлено в очередь фоновой подготовки. Плеер можно закрыть.';
            return;
        }

        if (status === 'processing') {
            const p = Math.max(0, Math.min(99, Number(prepareState.progress || 0)));
            prepareBtn.classList.add('preparing');
            prepareBtn.innerText = '⏳ ' + Math.floor(p) + '%';
            prepareBtn.title = 'Идёт фоновая подготовка. Плеер можно закрыть.';
            return;
        }

        if (status === 'ready') {
            prepareBtn.classList.add('ready');
            prepareBtn.innerText = '✓ Готово';
            prepareBtn.title = 'Видео подготовлено. При запуске будет использоваться готовый HLS. Нажмите, чтобы удалить.';
            return;
        }

        if (status === 'error') {
            prepareBtn.classList.add('delete');
            prepareBtn.innerText = '⚠ Ошибка';
            prepareBtn.title = 'Подготовка завершилась ошибкой. Нажмите, чтобы поставить задачу заново.';
            return;
        }

        prepareBtn.innerText = '⇩ Скачать';
        prepareBtn.title = 'Добавить видео в фоновую очередь подготовки';
    }

    // Периодически обновляет статус подготовки в плеере.
    function startPrepareUiTicker() {
        clearInterval(prepareUiTimer);
        prepareUiTimer = setInterval(async function () {
            await refreshPrepareState(false);
        }, 3000);
    }
    async function togglePrepare() {
        await refreshPrepareState(false);
        const status = prepareState.status || 'idle';

        if (status === 'ready') {
            try {
                const u = API + '?prepare_delete=1&content_id=' + encodeURIComponent(mediaContentId()) + '&t=' + Date.now();
                const d = await (await fetch(u, {cache: 'no-store'})).json();
                if (!d.ok) throw new Error(d.error || 'delete failed');
                prepareState = {status: 'idle', progress: 0, updated_at: Date.now()};
                renderPrepareButton();
                note('Подготовленный HLS удалён');
            } catch (e) {
                note('Не удалось удалить подготовленный HLS');
            }
            return;
        }

        if (status === 'queued' || status === 'processing') {
            note('Подготовка уже идёт. Плеер можно закрыть.');
            renderPrepareButton();
            return;
        }

        try {
            prepareBtn.disabled = true;
            prepareBtn.innerText = '⏳ Старт...';
            const u = API +
                '?prepare_start=1' +
                '&url=' + encodeURIComponent(src) +
                '&content_id=' + encodeURIComponent(mediaContentId()) +
                '&title=' + encodeURIComponent(titleText) +
                '&quality=' + encodeURIComponent(activeQuality) +
                '&audio_track=' + encodeURIComponent(String(activeAudioTrack)) +
                '&t=' + Date.now();
            const d = await (await fetch(u, {cache: 'no-store'})).json();
            if (!d.ok) throw new Error(d.error || 'prepare_start failed');
            prepareState = normalizePrepareItem(d.item || {status: 'queued'});
            renderPrepareButton();
            note('Добавлено в очередь. Плеер можно закрыть.');
        } catch (e) {
            prepareState = {status: 'error', error: e.message || 'prepare_start failed', progress: 0};
            renderPrepareButton();
            note('Не удалось добавить в очередь');
        }
    }

    // Для prepared-HLS корректирует duration/offset после загрузки metadata.
    function installPreparedMetadataFix() {
        let applied = false;

        const apply = function () {
            const mediaDuration = (v.duration && isFinite(v.duration) && v.duration > 0) ? Number(v.duration) : 0;

            if (mediaDuration > 0) {
                preparedMediaDuration = mediaDuration;
                duration = mediaDuration;
                preparedSec = mediaDuration;
                preparedUntil = mediaDuration;
                prepared.innerText = 'готово / ' + fmt(mediaDuration);
            }

            if (!applied) {
                applied = true;
                let t = Math.max(0, Number(preparedResumePending || 0));
                const d = mediaDuration || duration || 0;

                if (d > 0) t = Math.min(t, Math.max(0, d - 1));

                if (t > 0) {
                    try { v.currentTime = t; } catch (e) {}
                }
            }

            setTimeout(ui, 80);
        };

        v.addEventListener('loadedmetadata', apply, { once: false });
        v.addEventListener('durationchange', apply, { once: false });
        v.addEventListener('canplay', apply, { once: false });
        setTimeout(apply, 400);
        setTimeout(apply, 1400);
    }
    async function direct(url, resume) {
        mode.innerText = 'Direct';
        mode.className = 'pill ok';
        hideStatus();
        v.src = url;
        v.onloadedmetadata = () => {
            if (v.duration && isFinite(v.duration)) duration = v.duration;
            if (resume > 0) v.currentTime = resume;
            ui();
        };
        await applySubtitleTrack();
        tryPlay();
    }
    async function startHls(start, force) {
        sid = makeSid();
        const requestedStart = Math.max(0, start || 0);

        offset = requestedStart;
        preparedUntil = offset;
        preparedSec = 0;

        const readyPrepared = await refreshPrepareState(false);
        if (readyPrepared && readyPrepared.status === 'ready' && readyPrepared.hls_url) {
            /*
             * Важное отличие prepared-HLS от временного HLS/FFmpeg:
             * prepared-HLS — это полный файл с нулевой временной шкалой.
             * Поэтому offset должен быть 0, а requestedStart надо применять
             * только как video.currentTime. Иначе время удваивается:
             * globalTime = offset + currentTime.
             */
            /*
             * Для prepared-HLS нельзя доверять duration из БД как единственному
             * источнику. В старых/ручных задачах он мог быть взят из исходного
             * контейнера или соседнего файла и отличаться от фактической длины
             * готового HLS. Поэтому сначала берём длительность плейлиста
             * prepared_seconds, а после loadedmetadata переходим на v.duration.
             */
            const playlistDuration = Math.max(0, Number(readyPrepared.prepared_seconds || 0));
            const dbDuration = Math.max(0, Number(readyPrepared.duration || 0));
            const initialPreparedDuration = playlistDuration || dbDuration || duration || 0;
            const resumeAt = initialPreparedDuration > 0
                ? Math.min(Math.max(0, requestedStart), Math.max(0, initialPreparedDuration - 1))
                : Math.max(0, requestedStart);

            offset = 0;
            preparedMediaDuration = 0;
            preparedResumePending = resumeAt;
            duration = initialPreparedDuration || 0;
            preparedSec = initialPreparedDuration || 0;
            preparedUntil = initialPreparedDuration || 0;
            preparedPlaybackLoaded = true;

            showStatus('Открываю подготовленный HLS...');
            mode.innerText = 'Prepared HLS';
            mode.className = 'pill ok';
            prepared.innerText = 'готово' + (duration > 0 ? ' / ' + fmt(duration) : '');

            destroyHls();
            await loadHls(readyPrepared.hls_url + '&t=' + Date.now());
            installPreparedMetadataFix();
            await applySubtitleTrack();
            hideStatus();

            ui();
            return;
        }

        preparedPlaybackLoaded = false;
        preparedMediaDuration = 0;
        preparedResumePending = 0;
        showStatus('FFmpeg стартует с ' + fmt(offset) + '...');
        mode.innerText = 'HLS/FFmpeg';
        mode.className = 'pill warn';

        destroyHls();

        const u = API +
            '?transcode_start=1' +
            '&url=' + encodeURIComponent(src) +
            '&content_id=' + encodeURIComponent(mediaContentId()) +
            '&sid=' + encodeURIComponent(sid) +
            '&start=' + encodeURIComponent(String(offset)) +
            '&quality=' + encodeURIComponent(activeQuality) +
            '&audio_track=' + encodeURIComponent(String(activeAudioTrack)) +
            '&force=' + (force ? '1' : '0') +
            '&t=' + Date.now();

        const d = await (await fetch(u)).json();

        if (!d.ok) {
            showError(d.error || 'Не удалось запустить FFmpeg');
            return;
        }

        applyStatus(d);

        clearInterval(timer);
        timer = setInterval(poll, 1500);

        for (let i = 0; i < 80; i++) {
            const s = await fetchStatus();
            applyStatus(s);

            if (s.ready && s.hls_url) {
                await loadHls(s.hls_url);
                await applySubtitleTrack();
                hideStatus();
                return;
            }

            if (!s.running && !s.ready && i > 6) {
                showError('FFmpeg остановился. Лог: ' + esc(s.last_log || ''));
                return;
            }

            showStatus('Подготовка HLS: сегментов ' + (s.segments || 0) + ', готово ' + fmt(s.prepared_seconds || 0));
            await sleep(1200);
        }

        showError('HLS слишком долго не готовится');
    }
    async function loadHls(url) {
        destroyHls();
        hlsMediaRecoveries = 0;

        if (window.Hls && Hls.isSupported()) {
            hls = new Hls({
                lowLatencyMode: false,
                backBufferLength: 30,
                maxBufferLength: 60,
                manifestLoadingTimeOut: 20000,
                fragLoadingTimeOut: 30000
            });

            hls.loadSource(url);
            hls.attachMedia(v);

            hls.on(Hls.Events.ERROR, (e, d) => {
                console.warn('HLS', d);
                handleHlsError(d);
            });

            hls.on(Hls.Events.MANIFEST_PARSED, tryPlay);
        } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
            v.src = url;
            tryPlay();
        } else {
            showError('HLS не поддерживается, hls.js не загрузился');
        }
    }
    async function handleHlsError(d) {
        if (!d) return;

        const details = String(d.details || '');
        const type = String(d.type || '');

        if (type === 'mediaError' && hls && hlsMediaRecoveries < 2) {
            hlsMediaRecoveries++;

            try {
                note('Восстанавливаю HLS-буфер...');
                hls.recoverMediaError();
                return;
            } catch (e) {}
        }

        if (details === 'bufferAppendError' && !hlsSafeFallbackUsed) {
            hlsSafeFallbackUsed = true;
            activeQuality = 'safe';
            quality.innerText = activeQuality;

            showStatus('Плеер не принял поток. Перезапускаю в совместимом H.264/AAC режиме...');

            try {
                await startHls(Math.max(0, globalTime() - 2), true);
                return;
            } catch (e) {
                console.warn('Safe HLS fallback failed', e);
            }
        }

        if (d.fatal) {
            showError('Ошибка HLS: ' + esc(type) + ' / ' + esc(details));
        }
    }

    // Останавливает hls.js и освобождает ресурсы.
    function destroyHls() {
        if (hls) {
            try { hls.destroy(); } catch (e) {}
            hls = null;
        }

        try {
            v.removeAttribute('src');
            v.load();
        } catch (e) {}
    }
    async function poll() {
        applyStatus(await fetchStatus());
    }
    async function fetchStatus() {
        try {
            return await (await fetch(API + '?transcode_status=1&sid=' + encodeURIComponent(sid) + '&t=' + Date.now())).json();
        } catch (e) {
            return {ok: false, error: String(e)};
        }
    }

    // Применяет статус временной HLS-сессии или prepared-HLS к UI.
    function applyStatus(s) {
        if (!s || !s.ok) return;

        if (s.duration > 0) duration = Math.max(duration, +s.duration);

        offset = +(s.offset ?? offset);
        preparedUntil = +(s.prepared_until ?? preparedUntil);
        preparedSec = +(s.prepared_seconds ?? preparedSec);

        mode.innerText = s.encoding && s.encoding.name ? s.encoding.name : 'HLS';
        prepared.innerText = (s.segments || 0) + ' сегм. / ' + fmt(preparedSec || 0);

        if (s.encoding && s.encoding.cpu_level) quality.innerText = activeQuality + ' · CPU ' + s.encoding.cpu_level;

        ui();
    }
    async function seek(t) {
        const d = total();

        t = Math.max(0, t);

        if (d > 0) t = Math.min(d - 1, t);

        if (preparedPlaybackLoaded || (!trans && !needsProxy(src))) {
            const mediaDuration = preparedPlaybackLoaded && v.duration && isFinite(v.duration) && v.duration > 0 ? Number(v.duration) : d;
            if (mediaDuration > 0) t = Math.min(Math.max(0, t), Math.max(0, mediaDuration - 0.25));
            try { v.currentTime = t; } catch (e) {}
            setTimeout(ui, 80);
            return;
        }

        const local = t - offset;

        if (local >= 0 && local <= Math.max(0, preparedSec - 8)) {
            v.currentTime = local;
            return;
        }

        save(false);
        note('Перемотка: ' + fmt(t));
        await startHls(t, true);
    }

    // Обновляет время, прогресс, буфер и кнопки на экране.
    function ui() {
        const g = globalTime();
        const d = total();

        if (d > 0) {
            const p = Math.min(100, Math.max(0, g / d * 100));
            bar.style.width = p + '%';
            knob.style.left = p + '%';
            buf.style.width = Math.min(100, Math.max(0, preparedUntil / d * 100)) + '%';
            time.innerText = fmt(g) + ' / ' + fmt(d);
            if (iphoneReadout) iphoneReadout.innerText = fmt(g) + ' / ' + fmt(d);
            if (iphoneBar) iphoneBar.style.width = p + '%';
            if (iphoneBuf) iphoneBuf.style.width = Math.min(100, Math.max(0, preparedUntil / d * 100)) + '%';
        } else {
            time.innerText = fmt(g) + ' / --:--';
            if (iphoneReadout) iphoneReadout.innerText = fmt(g) + ' / --:--';
            if (iphoneBar) iphoneBar.style.width = '0%';
            if (iphoneBuf) iphoneBuf.style.width = '0%';
        }
    }

    // Возвращает позицию просмотра в глобальном времени фильма.
    function globalTime() {
        return (preparedPlaybackLoaded ? 0 : offset) + (v.currentTime || 0);
    }

    // Возвращает общую длительность фильма/серии.
    function total() {
        if (preparedPlaybackLoaded) {
            if (v.duration && isFinite(v.duration) && v.duration > 0) return Number(v.duration);
            if (preparedMediaDuration > 0) return preparedMediaDuration;
            if (duration > 0) return duration;
            return 0;
        }

        if (duration > 0) return duration;

        if (v.duration && isFinite(v.duration)) {
            return trans ? offset + v.duration : v.duration;
        }

        return 0;
    }

    // Сохраняет прогресс просмотра на сервер и отправляет его в Lampa.
    function save(ended, beacon = false) {
        const d = total();
        const pos = globalTime();

        if (!d || !isFinite(d)) return;

        const sec = Math.floor(pos);

        if (!ended && sec === lastSaved && !beacon) return;

        lastSaved = sec;

        const payload = {
            // Главный ключ записи прогресса. Должен быть стабильным и уникальным для фильма/серии.
            content_id: baseCid,
            progress_content_id: baseCid,
            media_content_id: mediaCid,
            progress_aliases: progressIds,
            title: titleText,
            url: src,
            position: pos,
            duration: d,
            percent: d ? Math.round(pos / d * 100) : 0,
            ended: !!(ended || v.ended),
            device_id: deviceId(),
            updated_at: Date.now()
        };

        notifyLampaProgress(payload);

        if (beacon && navigator.sendBeacon) {
            navigator.sendBeacon(API, new Blob([JSON.stringify(payload)], {type: 'application/json'}));
            return;
        }

        fetch(API, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        }).catch(() => {});
    }

    // Передаёт прогресс в родительский плагин Lampa через postMessage.
    function notifyLampaProgress(payload) {
        try {
            window.parent.postMessage({
                type: 'lampa-sync-progress',
                payload: payload
            }, '*');
        } catch (e) {}
    }

    // Корректно останавливает HLS и сообщает серверу о закрытии временной сессии.
    function shutdown() {
        if (stopped) return;

        stopped = true;
        save(false, true);
        clearInterval(timer);
        clearInterval(prepareUiTimer);

        if (trans || needsProxy(src)) {
            const u = API + '?transcode_stop=1&sid=' + encodeURIComponent(sid) + '&delete=1';

            if (navigator.sendBeacon) {
                navigator.sendBeacon(u, new Blob(['{}'], {type: 'application/json'}));
            } else {
                fetch(u, {method: 'POST', keepalive: true}).catch(() => {});
            }
        }
    }

    // Просит родительское окно закрыть iframe-плеер.
    function requestClose() {
        shutdown();

        try {
            window.parent.postMessage({type: 'lampa-sync-request-close'}, '*');
        } catch (e) {}

        setTimeout(() => {
            if (window.parent === window) history.back();
        }, 150);
    }

    // Переключает play/pause.
    function toggle() {
        v.paused ? tryPlay() : v.pause();
    }
    async function tryPlay() {
        try { await v.play(); } catch (e) {}
        state();
    }

    // Обновляет состояние центральной кнопки play/pause.
    function state() {
        const icon = v.paused ? '▶' : 'Ⅱ';
        play.innerText = icon;
        center.innerText = icon;
        if (ipPlay) ipPlay.innerText = icon;
    }

    // Переключает fullscreen.
    function toggleFullscreen() {
        if (document.fullscreenElement) {
            document.exitFullscreen().catch(() => {});
        } else if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
    }

    // Переключает режим вписывания/заполнения видео.
    function toggleFit() {
        fitMode = fitMode === 'contain' ? 'cover' : 'contain';
        v.style.objectFit = fitMode;
        note(fitMode === 'cover' ? 'Заполнение экрана' : 'По размеру экрана');
    }

    // Сбрасывает таймер скрытия интерфейса плеера.
    function resetHide() {
        document.body.classList.remove('clean');

        clearTimeout(hideTimer);

        hideTimer = setTimeout(() => {
            if (!v.paused && err.style.display !== 'block') {
                document.body.classList.add('clean');
            }
        }, 3500);
    }

    // Показывает временный статус по центру экрана.
    function showStatus(t) {
        statusBox.classList.remove('hide');
        statusText.innerText = t;
    }

    // Скрывает центральный статус.
    function hideStatus() {
        statusBox.classList.add('hide');
    }

    // Показывает ошибку воспроизведения.
    function showError(m) {
        err.style.display = 'block';
        err.innerHTML = m;
        document.body.classList.remove('clean');
    }

    // Показывает короткий toast.
    function note(m) {
        toast.innerText = m;
        toast.style.display = 'block';
        clearTimeout(note.t);
        note.t = setTimeout(() => toast.style.display = 'none', 1700);
    }

    // Решает, нужно ли проксировать исходный HTTP-поток через HTTPS API.
    function needsProxy(u) {
        return u.startsWith('http://') || u.includes(':8090') || u.includes('/stream/');
    }
    async function loadProgress() {
        try {
            const ids = uniqueProgressIds(progressIds.length ? progressIds : [baseCid]);
            const url = API +
                '?content_id=' + encodeURIComponent(baseCid) +
                '&content_ids=' + encodeURIComponent(ids.join(',')) +
                '&t=' + Date.now();

            const r = await fetch(url, {cache: 'no-store'});
            return r.ok ? await r.json() : null;
        } catch (e) {
            return null;
        }
    }

    function uniqueProgressIds(list) {
        const out = [];

        (list || []).forEach(v => {
            const s = String(v || '').trim();
            if (!s || out.includes(s)) return;
            out.push(s);
        });

        return out;
    }

    // Нормализует прогресс из query/API.
    function normProg(p) {
        if (!p) return null;

        let position = +(p.position || 0);
        const totalDuration = +(p.duration || 0);

        // Защита от старых битых сохранений вида 40:00 / 25:00.
        if (totalDuration > 0 && position > totalDuration + 30) {
            position = 0;
        }

        return {
            position: position,
            duration: totalDuration,
            percent: +(p.percent || 0),
            ended: p.ended === true || p.ended === 1 || p.ended === '1'
        };
    }

    // Создаёт id устройства для записи прогресса.
    function deviceId() {
        let id = localStorage.getItem('lampa_sync_device_id');

        if (!id) {
            id = 'dev_' + Math.random().toString(36).slice(2) + '_' + Date.now();
            localStorage.setItem('lampa_sync_device_id', id);
        }

        return id;
    }

    // Простой hash для идентификаторов плеера.
    function hash(s) {
        let h = 0;

        if (!s) return 'empty';

        for (let i = 0; i < s.length; i++) {
            h = ((h << 5) - h) + s.charCodeAt(i);
            h |= 0;
        }

        return 'c_' + Math.abs(h);
    }

    // Форматирует секунды в HH:MM:SS или MM:SS.
    function fmt(x) {
        x = Math.max(0, Math.floor(x || 0));

        const h = Math.floor(x / 3600);
        const m = Math.floor((x % 3600) / 60);
        const s = x % 60;

        return h > 0
            ? h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0')
            : m + ':' + String(s).padStart(2, '0');
    }

    // Экранирует строку для безопасного вывода в HTML.
    function esc(s) {
        return String(s)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;');
    }

    // Promise-задержка для коротких асинхронных пауз.
    function sleep(ms) {
        return new Promise(r => setTimeout(r, ms));
    }
</script>
</body>
